<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} – {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Source+Sans+3:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ site.baseurl }}/style.css">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a href="{{ site.baseurl }}/" class="site-logo">NK</a>
      <nav class="site-nav">
        {% for item in site.navigation %}
          <a href="{{ site.baseurl }}{{ item.url }}"
             class="nav-link {% if page.url == item.url %}active{% endif %}">
            {{ item.title }}
          </a>
        {% endfor %}
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-content">
        <p class="footer-name">Neeraj Karamchandani</p>
        <div class="footer-links">
          <a href="mailto:{{ site.email }}">Email</a>
          <a href="https://github.com/{{ site.github_username }}">GitHub</a>
          <a href="https://linkedin.com/in/{{ site.linkedin_username }}">LinkedIn</a>
        </div>
      </div>
    </div>
  </footer>

</body>
</html>
